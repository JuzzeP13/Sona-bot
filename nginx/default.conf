upstream sofa_backend {
    server backend:4000;
}

upstream sofa_frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    location = /sofa-bot {
        return 404;
    }

    location ^~ /sofa-bot/ {
        return 404;
    }

    location /api/ {
        proxy_pass http://sofa_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location / {
        proxy_pass http://sofa_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
